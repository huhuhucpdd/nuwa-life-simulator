<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博女娲 · 人生模拟器 Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .setup-box, .chat-box {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9em;
            color: #aaa;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1em;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .hint {
            font-size: 0.8em;
            color: #666;
            margin-top: 4px;
        }
        button {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            margin-bottom: 16px;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .user-message {
            background: rgba(0, 212, 255, 0.15);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background: rgba(123, 44, 191, 0.15);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
        }
        .loading {
            text-align: center;
            color: #00d4ff;
            padding: 20px;
        }
        .error {
            background: rgba(255,0,0,0.1);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>赛博女娲 · 人生模拟器</h1>
        <p class="subtitle">在平行时间线中，看见另一种可能</p>

        <!-- 设置面板 -->
        <div id="setupPanel" class="setup-box">
            <div class="form-group">
                <label>选择 AI 提供商</label>
                <select id="provider">
                    <option value="openai">OpenAI (GPT-4)</option>
                    <option value="anthropic">Anthropic (Claude 3)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="sk-... 或 sk-ant-...">
                <p class="hint">🔒 仅存储在本地浏览器，不会上传到任何服务器</p>
            </div>
            
            <div class="form-group">
                <label>系统提示词来源</label>
                <select id="promptSource">
                    <option value="builtin">使用内置精简版</option>
                    <option value="custom">粘贴自定义 SKILL.md</option>
                </select>
            </div>
            
            <div id="customPromptBox" class="form-group hidden">
                <label>粘贴 SKILL.md 内容（可选）</label>
                <textarea id="customPrompt" rows="6" placeholder="将 SKILL.md 的完整内容粘贴到这里..."></textarea>
            </div>
            
            <button onclick="startChat()">启动时间编辑室</button>
        </div>

        <!-- 聊天面板 -->
        <div id="chatPanel" class="chat-box hidden">
            <div id="messages" class="chat-messages"></div>
            <div id="errorBox" class="error hidden"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="说点什么，比如：我想知道如果去年我辞职了会怎样..." 
                       onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()" id="sendBtn">发送</button>
            </div>
        </div>
    </div>

    <script>
        // 内置精简版系统提示词（基于 SKILL.md 核心逻辑）
        const BUILTIN_PROMPT = `你是「赛博女娲」，一个个人人生推演系统。基于用户真实行为数据进行条件预测，不算命、不给建议，只推演"如果...那么..."。

核心规则：
1. 所有预测必须带可信度：[X% | Y-Z个月]
2. 时间越远可信度越低：0-6月(70-85%)、6月-2年(50-65%)、2-5年(30-45%)、5年+(10-20%概念展示)
3. 用户可跳过任何环节，跳过=默认先验，明确告知置信度下降
4. 不预测具体他人行为，不做医疗/投资建议
5. 维护三条时间线：α(基准惯性)、β(激进-30%抑制)、γ(随机黑天鹅)

推演结构：
- 用户指定"决策节点"（时间+事件）和"修改变量"
- 生成三条线并标注半衰期
- 输出时间线卡片 + 平行对比卡

启动时问用户："告诉我：你想回溯到哪个时间点的哪个决定？改成什么？"

然后直接开始推演，边推演边问1-2个澄清问题，不要一次性问太多。保持理性、略带幽默的语气。`;

        let messages = [];
        let config = {};

        // 切换自定义提示词输入框
        document.getElementById('promptSource').addEventListener('change', (e) => {
            document.getElementById('customPromptBox').classList.toggle('hidden', e.target.value !== 'custom');
        });

        function startChat() {
            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('apiKey').value.trim();
            const promptSource = document.getElementById('promptSource').value;
            
            if (!apiKey) {
                alert('请输入 API Key');
                return;
            }

            const systemPrompt = promptSource === 'custom' && document.getElementById('customPrompt').value.trim()
                ? document.getElementById('customPrompt').value.trim()
                : BUILTIN_PROMPT;

            config = { provider, apiKey, systemPrompt };
            
            // 保存到本地存储（可选，方便下次使用）
            localStorage.setItem('nuwa_provider', provider);
            localStorage.setItem('nuwa_apiKey', apiKey);
            
            // 初始化消息历史
            messages = [{ role: 'system', content: systemPrompt }];
            
            // 切换面板
            document.getElementById('setupPanel').classList.add('hidden');
            document.getElementById('chatPanel').classList.remove('hidden');
            
            // 发送欢迎语
            addMessage('ai', '欢迎来到时间编辑室。我可以帮你推演未来的可能性，也能让你回到过去的某个瞬间，改写一个选择，看看会衍生出怎样的世界。\n\n想从哪里开始？告诉我：你想回溯到哪个时间点的哪个决定？');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            input.value = '';
            addMessage('user', text);
            messages.push({ role: 'user', content: text });
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            showLoading();
            hideError();

            try {
                let response;
                if (config.provider === 'openai') {
                    response = await callOpenAI();
                } else {
                    response = await callAnthropic();
                }
                
                const aiText = config.provider === 'openai' 
                    ? response.choices[0].message.content 
                    : response.content[0].text;
                
                messages.push({ role: 'assistant', content: aiText });
                addMessage('ai', aiText);
                
            } catch (err) {
                showError('请求失败：' + err.message);
            } finally {
                sendBtn.disabled = false;
                hideLoading();
            }
        }

        async function callOpenAI() {
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${config.apiKey}`
                },
                body: JSON.stringify({
                    model: 'gpt-4',
                    messages: messages,
                    temperature: 0.8,
                    max_tokens: 2000
                })
            });
            
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error?.message || 'OpenAI API 错误');
            }
            return res.json();
        }

        async function callAnthropic() {
            // 转换消息格式为 Claude 格式
            const systemMsg = messages.find(m => m.role === 'system')?.content || '';
            const conversation = messages.filter(m => m.role !== 'system').map(m => ({
                role: m.role === 'assistant' ? 'assistant' : 'user',
                content: m.content
            }));

            const res = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': config.apiKey,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-3-sonnet-20240229',
                    max_tokens: 2000,
                    system: systemMsg,
                    messages: conversation
                })
            });
            
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error?.message || 'Anthropic API 错误');
            }
            return res.json();
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function showLoading() {
            const div = document.createElement('div');
            div.id = 'loadingMsg';
            div.className = 'loading';
            div.textContent = '赛博女娲正在推演时间线...';
            document.getElementById('messages').appendChild(div);
        }

        function hideLoading() {
            const el = document.getElementById('loadingMsg');
            if (el) el.remove();
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorBox').classList.add('hidden');
        }

        // 恢复上次设置
        window.onload = () => {
            const savedProvider = localStorage.getItem('nuwa_provider');
            const savedKey = localStorage.getItem('nuwa_apiKey');
            if (savedProvider) document.getElementById('provider').value = savedProvider;
            if (savedKey) document.getElementById('apiKey').value = savedKey;
        };
    </script>
</body>
</html>
